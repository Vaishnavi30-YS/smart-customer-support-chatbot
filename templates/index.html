<!DOCTYPE html>
<html>

<head>

    <title>Smart Customer Support Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>


<body>

<div class="chat-container">


    <h1>
    🤖 Smart Customer Support Chatbot
    <span class="status">🟢 Online</span>
</h1>


    <div class="chat-box" id="chat-box">

        <div class="bot-message">
            Hello! 👋 How can I help you today?
        </div>

    </div>



    <div class="quick-buttons">


        <button onclick="sendQuickMessage('where is my order')">
            📦 Track Order
        </button>


        <button onclick="sendQuickMessage('payment')">
            💳 Payment
        </button>


        <button onclick="sendQuickMessage('refund')">
            ↩️ Refund
        </button>


        <button onclick="sendQuickMessage('contact support')">
            📞 Support
        </button>


    </div>




    <div class="input-area">


        <input 
        type="text" 
        id="user-input" 
        placeholder="Type your message..."
        >


        <button onclick="sendMessage()">
            Send
        </button>


        <button onclick="window.location.href='/history'">
            📜 Chat History
        </button>
        <button onclick="clearChat()">
    🗑️ Clear Chat
</button>


    </div>



</div>



<script src="{{ url_for('static', filename='script.js') }}"></script>


</body>

</html>
