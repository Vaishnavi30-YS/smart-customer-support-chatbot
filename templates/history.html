<!DOCTYPE html>
<html>

<head>

<title>Chat History</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f1f5f9;
    padding:30px;
}


h1{
    text-align:center;
    color:#333;
}


.container{
    max-width:1000px;
    margin:auto;
}


table{

    width:100%;
    background:white;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;

}


th{

    background:#4f46e5;
    color:white;
    padding:12px;

}


td{

    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;

}


tr:hover{

    background:#f8fafc;

}


.back{

    display:block;
    width:150px;
    margin:25px auto;
    padding:10px;
    text-align:center;
    background:#4f46e5;
    color:white;
    text-decoration:none;
    border-radius:8px;

}


</style>

</head>


<body>


<div class="container">


<h1>📜 Chat History</h1>


<table>


<tr>

<th>ID</th>
<th>User Message</th>
<th>Bot Response</th>
<th>Time</th>

</tr>



{% for chat in chats %}

<tr>

<td>{{chat[0]}}</td>

<td>{{chat[1]}}</td>

<td>{{chat[2]}}</td>

<td>{{chat[3]}}</td>

</tr>


{% endfor %}


</table>


<a class="back" href="/">⬅ Back to Chat</a>


</div>


</body>


</html>
